<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Personal Document Vault — Demo</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { margin:0; font-family: Inter, system-ui, sans-serif; background: var(--bg); }
    .hero { max-width:1100px; margin:48px auto; padding:36px; }
    .card { padding:24px; border-radius:16px; background:#fff; }
    a.button { display:inline-block; margin-top:12px; padding:10px 14px; background:#4f46e5; color:#fff; border-radius:10px; text-decoration:none; }
    img.screenshot{ max-width:100%; border-radius:12px; box-shadow:0 12px 30px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <main class="hero">
    <section class="card">
      <h1>Personal Document Vault</h1>
      <p>This is a static demo for GitHub Pages. Use the live Node app for full upload features.</p>
      <a class="button" href="https://github.com/Satyam0202/Satyam0202">View Source on GitHub</a>
    </section>
    <section style="margin-top:20px">
      <img class="screenshot" src="/images/profile.png" alt="Demo">
    </section>
  </main>
</body>
</html>
