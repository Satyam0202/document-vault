<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <title>Login • Document Vault</title>
  <link rel="icon" href="images/favicon.jpg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-box">
    <!-- Logo -->
    <div class="login-logo">
      <div class="icon">🔐</div>
      <h1>Document Vault</h1>
      <p>Your personal secure document space</p>
    </div>

    <!-- Card -->
    <div class="card login-form-card">
      <div id="error-msg" class="error-msg">Invalid username or password.</div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="input" id="username" type="text" required placeholder="Enter your username" autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="input" id="password" type="password" required placeholder="Enter your password" autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary login-submit">Login →</button>
      </form>
    </div>

    <p class="login-footer">Protected vault • Access restricted</p>
  </div>

  <script>
    // Already logged in? Redirect
    if (sessionStorage.getItem('vault_auth') === 'true') {
      location.href = 'dashboard.html';
    }

    // Saved theme
    const t = localStorage.getItem('vault_theme');
    if (t) document.documentElement.setAttribute('data-theme', t);

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      // ── Credentials ── change these if needed ──
      const VALID_USER = 'satyam02';
      const VALID_PASS = 'Muskan!0202';
      // ───────────────────────────────────────────

      if (user === VALID_USER && pass === VALID_PASS) {
        sessionStorage.setItem('vault_auth', 'true');
        sessionStorage.setItem('vault_user', user);
        location.href = 'dashboard.html';
      } else {
        const err = document.getElementById('error-msg');
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
      }
    }
  </script>
</body>
</html>
