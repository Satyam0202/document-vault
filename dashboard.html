<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard • Demo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="hero">
    <section class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <p class="small">Document Locker</p>
          <h2>Personal Document Vault</h2>
          <p class="small">A demo of the dashboard UI. Uploads require the full server.</p>
        </div>
        <div>
          <a class="button" href="index.html">Home</a>
        </div>
      </div>

      <div style="margin-top:18px;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;">
        <div style="flex:1;min-width:300px;">
          <h3>Hello, satyam</h3>
          <p class="small">A polished dashboard for secure uploads, smart organization, and instant access to your most important files.</p>
          <div style="margin-top:12px;display:flex;gap:12px;">
            <button class="button">View Documents</button>
            <button class="button">Upload (needs server)</button>
          </div>

          <div style="margin-top:18px;display:flex;gap:12px;">
            <div class="card" style="padding:12px;min-width:120px;">Documents<br><strong>12</strong></div>
            <div class="card" style="padding:12px;min-width:120px;">Categories<br><strong>5</strong></div>
          </div>
        </div>
        <div style="width:360px;">
          <img src="https://raw.githubusercontent.com/Satyam0202/Satyam0202/master/public/images/profile.png" alt="profile" style="width:100%;border-radius:12px;">
          <div style="margin-top:12px;" class="small">Secure vault status: <strong>Active</strong></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
